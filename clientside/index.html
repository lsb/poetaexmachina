  <style>

<body>
  <h1>poeta ex machina.</h1>
  <p class="subtitle">chanted latin poetry, any poem, any meter. synthesized in the browser.</p>

  <div id="error-status" class="error-status" style="display: none;"></div>

  <textarea id="text" placeholder="Enter Latin text here..."></textarea>

  <div style="margin-bottom: 8px;">
    <span class="hint">Examples:</span>
    <button class="example-btn" onclick="loadExample('aeneid')">Aeneid I.1-7</button>
    <button class="example-btn" onclick="loadExample('aeneid1')">Aeneid 1</button>
    <button class="example-btn" onclick="loadExample('catullus')">Catullus 5</button>
    <button class="example-btn" onclick="loadExample('horace')">Horace Odes 1.1</button>
    <button class="example-btn" onclick="loadExample('ovid')">Ovid Met. 1.1-4</button>
  </div>

  <div class="meter-row">
    <select id="meter-preset" onchange="onPresetChange()">
      <option value="lrlrlrlrlrla" selected>Dactylic Hexameter</option>
      <option value="lrlrlalrlrla">Elegiac Pentameter</option>
      <option value="aalsslalass">Hendecasyllable</option>
      <option value="laalaasslax">Sapphic</option>
      <option value="alaalaasla">Alcaic</option>
    </select>
    <input type="text" id="meter" value="lrlrlrlrlrla" oninput="onMeterInput()">
    <span class="hint" style="font-family: verdana, helvetica, arial, sans-serif;">l=long s=short a=anceps r=resolvable</span>
  </div>

    <button id="play-btn" onclick="playAudio()" disabled>Play</button>
    <button id="download-btn" onclick="downloadWav()" disabled>Download</button>
    <button onclick="togglePho()">Show&nbsp;.pho</button>
    <audio id="audio-player" controls style="display: none;"></audio>
  </div>

    <div id="pho-output" class="pho-output"></div>

  <script>
    const CIRCUMFLEX = {a:'\u00e2',e:'\u00ea',i:'\u00ee',o:'\u00f4',u:'\u00fb'};
    const EXAMPLES = {
      aeneid: {
        text: 'Arma virumque cano, Troiae qui primus ab oris\nItaliam, fato profugus, Laviniaque venit\nlitora, multum ille et terris iactatus et alto\nvi superum saevae memorem Iunonis ob iram;\nmulta quoque et bello passus, dum conderet urbem,\ninferretque deos Latio, genus unde Latinum,\nAlbanique patres, atque altae moenia Romae.',
        meter: 'lrlrlrlrlrla'
      },
      aeneid1: {
        text: "Arma virumque cano, Troiae qui primus ab oris\nItaliam, fato profugus, Laviniaque venit\nlitora, multum ille et terris iactatus et alto\nvi superum saevae memorem Iunonis ob iram;\nmulta quoque et bello passus, dum conderet urbem,\ninferretque deos Latio, genus unde Latinum,\nAlbanique patres, atque altae moenia Romae.\nMusa, mihi causas memora, quo numine laeso,\nquidve dolens, regina deum tot volvere casus\ninsignem pietate virum, tot adire labores\nimpulerit. Tantaene animis caelestibus irae?\nUrbs antiqua fuit, Tyrii tenuere coloni,\nKarthago, Italiam contra Tiberinaque longe\nostia, dives opum studiisque asperrima belli;\nquam Iuno fertur terris magis omnibus unam\nposthabita coluisse Samo; hic illius arma,\nhic currus fuit; hoc regnum dea gentibus esse,\nsi qua fata sinant, iam tum tenditque fovetque.\nProgeniem sed enim Troiano a sanguine duci\naudierat, Tyrias olim quae verteret arces;\nhinc populum late regem belloque superbum\nventurum excidio Libyae: sic volvere Parcas.\nId metuens, veterisque memor Saturnia belli,\nprima quod ad Troiam pro caris gesserat Argis:\nnecdum etiam causae irarum saevique dolores\nexciderant animo: manet alta mente repostum\niudicium Paridis spretaeque iniuria formae,\net genus invisum, et rapti Ganymedis honores.\nHis accensa super, iactatos aequore toto\nTroas, reliquias Danaum atque immitis Achilli,\narcebat longe Latio, multosque per annos\nerrabant, acti fatis, maria omnia circum.\nTantae molis erat Romanam condere gentem!\nVix e conspectu Siculae telluris in altum\nvela dabant laeti, et spumas salis aere ruebant,\ncum Iuno, aeternum servans sub pectore volnus,\nhaec secum: 'Mene incepto desistere victam,\nnec posse Italia Teucrorum avertere regem?\nQuippe vetor fatis. Pallasne exurere classem\nArgivom atque ipsos potuit submergere ponto,\nunius ob noxam et furias Aiacis Oilei?\nIpsa, Iovis rapidum iaculata e nubibus ignem,\ndisiecitque rates evertitque aequora ventis,\nillum expirantem transfixo pectore flammas\nturbine corripuit scopuloque infixit acuto.\nAst ego, quae divom incedo regina, Iovisque\net soror et coniunx, una cum gente tot annos\nbella gero! Et quisquam numen Iunonis adoret\npraeterea, aut supplex aris imponet honorem?'\nTalia flammato secum dea corde volutans\nnimborum in patriam, loca feta furentibus austris,\nAeoliam venit. Hic vasto rex Aeolus antro\nluctantes ventos tempestatesque sonoras\nimperio premit ac vinclis et carcere frenat.\nIlli indignantes magno cum murmure montis\ncircum claustra fremunt; celsa sedet Aeolus arce\nsceptra tenens, mollitque animos et temperat iras.\nNi faciat, maria ac terras caelumque profundum\nquippe ferant rapidi secum verrantque per auras.\nSed pater omnipotens speluncis abdidit atris,\nhoc metuens, molemque et montis insuper altos\nimposuit, regemque dedit, qui foedere certo\net premere et laxas sciret dare iussus habenas.\nAd quem tum Iuno supplex his vocibus usa est:\n'Aeole, namque tibi divom pater atque hominum rex\net mulcere dedit fluctus et tollere vento,\ngens inimica mihi Tyrrhenum navigat aequor,\nIlium in Italiam portans victosque Penates:\nincute vim ventis submersasque obrue puppes,\naut age diversos et disiice corpora ponto.\nSunt mihi bis septem praestanti corpore nymphae,\nquarum quae forma pulcherrima Deiopea,\nconubio iungam stabili propriamque dicabo,\nomnis ut tecum meritis pro talibus annos\nexigat, et pulchra faciat te prole parentem.'\nAeolus haec contra: 'Tuus, O regina, quid optes\nexplorare labor; mihi iussa capessere fas est.\nTu mihi, quodcumque hoc regni, tu sceptra Iovemque\nconcilias, tu das epulis accumbere divom,\nnimborumque facis tempestatumque potentem.'\nHaec ubi dicta, cavum conversa cuspide montem\nimpulit in latus: ac venti, velut agmine facto,\nqua data porta, ruunt et terras turbine perflant.\nIncubuere mari, totumque a sedibus imis\nuna Eurusque Notusque ruunt creberque procellis\nAfricus, et vastos volvunt ad litora fluctus.\nInsequitur clamorque virum stridorque rudentum.\nEripiunt subito nubes caelumque diemque\nTeucrorum ex oculis; ponto nox incubat atra.\nIntonuere poli, et crebris micat ignibus aether,\npraesentemque viris intentant omnia mortem.\nExtemplo Aeneae solvuntur frigore membra:\ningemit, et duplicis tendens ad sidera palmas\ntalia voce refert: 'O terque quaterque beati,\nquis ante ora patrum Troiae sub moenibus altis\ncontigit oppetere! O Danaum fortissime gentis\nTydide! Mene Iliacis occumbere campis\nnon potuisse, tuaque animam hanc effundere dextra,\nsaevus ubi Aeacidae telo iacet Hector, ubi ingens\nSarpedon, ubi tot Simois correpta sub undis\nscuta virum galeasque et fortia corpora volvit?'\nTalia iactanti stridens Aquilone procella\nvelum adversa ferit, fluctusque ad sidera tollit.\nFranguntur remi; tum prora avertit, et undis\ndat latus; insequitur cumulo praeruptus aquae mons.\nHi summo in fluctu pendent; his unda dehiscens\nterram inter fluctus aperit; furit aestus harenis.\nTris Notus abreptas in saxa latentia torquet - -\nsaxa vocant Itali mediis quae in fluctibus aras - -\ndorsum immane mari summo; tris Eurus ab alto\nin brevia et Syrtis urget, miserabile visu,\ninliditque vadis atque aggere cingit harenae.\nUnam, quae Lycios fidumque vehebat Oronten,\nipsius ante oculos ingens a vertice pontus\nin puppim ferit: excutitur pronusque magister\nvolvitur in caput; ast illam ter fluctus ibidem\ntorquet agens circum, et rapidus vorat aequore vortex.\nAdparent rari nantes in gurgite vasto,\narma virum, tabulaeque, et Troia gaza per undas.\nIam validam Ilionei navem, iam fortis Achati,\net qua vectus Abas, et qua grandaevus Aletes,\nvicit hiems; laxis laterum compagibus omnes\naccipiunt inimicum imbrem, rimisque fatiscunt.\nInterea magno misceri murmure pontum,\nemissamque hiemem sensit Neptunus, et imis\nstagna refusa vadis, graviter commotus; et alto\nprospiciens, summa placidum caput extulit unda.\nDisiectam Aeneae, toto videt aequore classem,\nfluctibus oppressos Troas caelique ruina,\nnec latuere doli fratrem Iunonis et irae.\nEurum ad se Zephyrumque vocat, dehinc talia fatur:\n'Tantane vos generis tenuit fiducia vestri?\nIam caelum terramque meo sine numine, venti,\nmiscere, et tantas audetis tollere moles?\nQuos ego - -sed motos praestat componere fluctus.\nPost mihi non simili poena commissa luetis.\nMaturate fugam, regique haec dicite vestro:\nnon illi imperium pelagi saevumque tridentem,\nsed mihi sorte datum. Tenet ille immania saxa,\nvestras, Eure, domos; illa se iactet in aula\nAeolus, et clauso ventorum carcere regnet.'\nSic ait, et dicto citius tumida aequora placat,\ncollectasque fugat nubes, solemque reducit.\nCymothoe simul et Triton adnixus acuto\ndetrudunt navis scopulo; levat ipse tridenti;\net vastas aperit syrtis, et temperat aequor,\natque rotis summas levibus perlabitur undas.\nAc veluti magno in populo cum saepe coorta est\nseditio, saevitque animis ignobile volgus,\niamque faces et saxa volant - -furor arma ministrat;\ntum, pietate gravem ac meritis si forte virum quem\nconspexere, silent, arrectisque auribus adstant;\nille regit dictis animos, et pectora mulcet, - -\nsic cunctus pelagi cecidit fragor, aequora postquam\nprospiciens genitor caeloque invectus aperto\nflectit equos, curruque volans dat lora secundo.\nDefessi Aeneadae, quae proxima litora, cursu\ncontendunt petere, et Libyae vertuntur ad oras.\nEst in secessu longo locus: insula portum\nefficit obiectu laterum, quibus omnis ab alto\nfrangitur inque sinus scindit sese unda reductos.\nHinc atque hinc vastae rupes geminique minantur\nin caelum scopuli, quorum sub vertice late\naequora tuta silent; tum silvis scaena coruscis\ndesuper horrentique atrum nemus imminet umbra.\nFronte sub adversa scopulis pendentibus antrum,\nintus aquae dulces vivoque sedilia saxo,\nnympharum domus: hic fessas non vincula navis\nulla tenent, unco non alligat ancora morsu.\nHuc septem Aeneas collectis navibus omni\nex numero subit; ac magno telluris amore\negressi optata potiuntur Troes harena,\net sale tabentis artus in litore ponunt.\nAc primum silici scintillam excudit Achates,\nsuccepitque ignem foliis, atque arida circum\nnutrimenta dedit, rapuitque in fomite flammam.\nTum Cererem corruptam undis Cerealiaque arma\nexpediunt fessi rerum, frugesque receptas\net torrere parant flammis et frangere saxo.\nAeneas scopulum interea conscendit, et omnem\nprospectum late pelago petit, Anthea si quem\niactatum vento videat Phrygiasque biremis,\naut Capyn, aut celsis in puppibus arma Caici.\nNavem in conspectu nullam, tris litore cervos\nprospicit errantis; hos tota armenta sequuntur\na tergo, et longum per vallis pascitur agmen.\nConstitit hic, arcumque manu celerisque sagittas\ncorripuit, fidus quae tela gerebat Achates;\nductoresque ipsos primum, capita alta ferentis\ncornibus arboreis, sternit, tum volgus, et omnem\nmiscet agens telis nemora inter frondea turbam;\nnec prius absistit, quam septem ingentia victor\ncorpora fundat humi, et numerum cum navibus aequet.\nHinc portum petit, et socios partitur in omnes.\nVina bonus quae deinde cadis onerarat Acestes\nlitore Trinacrio dederatque abeuntibus heros,\ndividit, et dictis maerentia pectora mulcet:\n'O socii - -neque enim ignari sumus ante malorum - -\nO passi graviora, dabit deus his quoque finem.\nVos et Scyllaeam rabiem penitusque sonantis\naccestis scopulos, vos et Cyclopea saxa\nexperti: revocate animos, maestumque timorem\nmittite: forsan et haec olim meminisse iuvabit.\nPer varios casus, per tot discrimina rerum\ntendimus in Latium; sedes ubi fata quietas\nostendunt; illic fas regna resurgere Troiae.\nDurate, et vosmet rebus servate secundis.'\nTalia voce refert, curisque ingentibus aeger\nspem voltu simulat, premit altum corde dolorem.\nIlli se praedae accingunt, dapibusque futuris;\ntergora deripiunt costis et viscera nudant;\npars in frusta secant veribusque trementia figunt;\nlitore aena locant alii, flammasque ministrant.\nTum victu revocant vires, fusique per herbam\nimplentur veteris Bacchi pinguisque ferinae.\nPostquam exempta fames epulis mensaeque remotae,\namissos longo socios sermone requirunt,\nspemque metumque inter dubii, seu vivere credant,\nsive extrema pati nec iam exaudire vocatos.\nPraecipue pius Aeneas nunc acris Oronti,\nnunc Amyci casum gemit et crudelia secum\nfata Lyci, fortemque Gyan, fortemque Cloanthum.\nEt iam finis erat, cum Iuppiter aethere summo\ndespiciens mare velivolum terrasque iacentis\nlitoraque et latos populos, sic vertice caeli\nconstitit, et Libyae defixit lumina regnis.\nAtque illum talis iactantem pectore curas\ntristior et lacrimis oculos suffusa nitentis\nadloquitur Venus: 'O qui res hominumque deumque\naeternis regis imperiis, et fulmine terres,\nquid meus Aeneas in te committere tantum,\nquid Troes potuere, quibus, tot funera passis,\ncunctus ob Italiam terrarum clauditur orbis?\nCerte hinc Romanos olim, volventibus annis,\nhinc fore ductores, revocato a sanguine Teucri,\nqui mare, qui terras omni dicione tenerent,\npollicitus, quae te, genitor, sententia vertit?\nHoc equidem occasum Troiae tristisque ruinas\nsolabar, fatis contraria fata rependens;\nnunc eadem fortuna viros tot casibus actos\ninsequitur. Quem das finem, rex magne, laborum?\nAntenor potuit, mediis elapsus Achivis,\nIllyricos penetrare sinus, atque intima tutus\nregna Liburnorum, et fontem superare Timavi,\nunde per ora novem vasto cum murmure montis\nit mare proruptum et pelago premit arva sonanti.\nHic tamen ille urbem Patavi sedesque locavit\nTeucrorum, et genti nomen dedit, armaque fixit\nTroia; nunc placida compostus pace quiescit:\nnos, tua progenies, caeli quibus adnuis arcem,\nnavibus (infandum!) amissis, unius ob iram\nprodimur atque Italis longe disiungimur oris.\nHic pietatis honos? Sic nos in sceptra reponis?'\nOlli subridens hominum sator atque deorum,\nvoltu, quo caelum tempestatesque serenat,\noscula libavit natae, dehinc talia fatur:\n'Parce metu, Cytherea: manent immota tuorum\nfata tibi; cernes urbem et promissa Lavini\nmoenia, sublimemque feres ad sidera caeli\nmagnanimum Aenean; neque me sententia vertit.\nHic tibi (fabor enim, quando haec te cura remordet,\nlongius et volvens fatorum arcana movebo)\nbellum ingens geret Italia, populosque feroces\ncontundet, moresque viris et moenia ponet,\ntertia dum Latio regnantem viderit aestas,\nternaque transierint Rutulis hiberna subactis.\nAt puer Ascanius, cui nunc cognomen Iulo\nadditur, - -Ilus erat, dum res stetit Ilia regno, - -\ntriginta magnos volvendis mensibus orbis\nimperio explebit, regnumque ab sede Lavini\ntransferet, et longam multa vi muniet Albam.\nHic iam ter centum totos regnabitur annos\ngente sub Hectorea, donec regina sacerdos,\nMarte gravis, geminam partu dabit Ilia prolem.\nInde lupae fulvo nutricis tegmine laetus\nRomulus excipiet gentem, et Mavortia condet\nmoenia, Romanosque suo de nomine dicet.\nHis ego nec metas rerum nec tempora pono;\nimperium sine fine dedi. Quin aspera Iuno,\nquae mare nunc terrasque metu caelumque fatigat,\nconsilia in melius referet, mecumque fovebit\nRomanos rerum dominos gentemque togatam:\nsic placitum. Veniet lustris labentibus aetas,\ncum domus Assaraci Phthiam clarasque Mycenas\nservitio premet, ac victis dominabitur Argis.\nNascetur pulchra Troianus origine Caesar,\nimperium oceano, famam qui terminet astris, - -\nIulius, a magno demissum nomen Iulo.\nHunc tu olim caelo, spoliis Orientis onustum,\naccipies secura; vocabitur hic quoque votis.\nAspera tum positis mitescent saecula bellis;\ncana Fides, et Vesta, Remo cum fratre Quirinus,\niura dabunt; dirae ferro et compagibus artis\nclaudentur Belli portae; Furor impius intus,\nsaeva sedens super arma, et centum vinctus aenis\npost tergum nodis, fremet horridus ore cruento.'\nHaec ait, et Maia genitum demittit ab alto,\nut terrae, utque novae pateant Karthaginis arces\nhospitio Teucris, ne fati nescia Dido\nfinibus arceret: volat ille per aera magnum\nremigio alarum, ac Libyae citus adstitit oris.\nEt iam iussa facit, ponuntque ferocia Poeni\ncorda volente deo; in primis regina quietum\naccipit in Teucros animum mentemque benignam.\nAt pius Aeneas, per noctem plurima volvens,\nut primum lux alma data est, exire locosque\nexplorare novos, quas vento accesserit oras,\nqui teneant, nam inculta videt, hominesne feraene,\nquaerere constituit, sociisque exacta referre\nClassem in convexo nemorum sub rupe cavata\narboribus clausam circum atque horrentibus umbris\nocculit; ipse uno graditur comitatus Achate,\nbina manu lato crispans hastilia ferro.\nCui mater media sese tulit obvia silva,\nvirginis os habitumque gerens, et virginis arma\nSpartanae, vel qualis equos Threissa fatigat\nHarpalyce, volucremque fuga praevertitur Hebrum.\nNamque umeris de more habilem suspenderat arcum\nvenatrix, dederatque comam diffundere ventis,\nnuda genu, nodoque sinus collecta fluentis.\nAc prior, 'Heus' inquit 'iuvenes, monstrate mearum\nvidistis si quam hic errantem forte sororum,\nsuccinctam pharetra et maculosae tegmine lyncis,\naut spumantis apri cursum clamore prementem.'\nSic Venus; et Veneris contra sic filius orsus:\n'Nulla tuarum audita mihi neque visa sororum - -\nO quam te memorem, virgo? Namque haud tibi voltus\nmortalis, nec vox hominem sonat: O, dea certe - -\nan Phoebi soror? an nympharum sanguinis una? - -\nsis felix, nostrumque leves, quaecumque, laborem,\net, quo sub caelo tandem, quibus orbis in oris\niactemur, doceas. Ignari hominumque locorumque\nerramus, vento huc vastis et fluctibus acti:\nmulta tibi ante aras nostra cadet hostia dextra.'\nTum Venus: 'Haud equidem tali me dignor honore;\nvirginibus Tyriis mos est gestare pharetram,\npurpureoque alte suras vincire cothurno.\nPunica regna vides, Tyrios et Agenoris urbem;\nsed fines Libyci, genus intractabile bello.\nImperium Dido Tyria regit urbe profecta,\ngermanum fugiens. Longa est iniuria, longae\nambages; sed summa sequar fastigia rerum.\n'Huic coniunx Sychaeus erat, ditissimus agri\nPhoenicum, et magno miserae dilectus amore,\ncui pater intactam dederat, primisque iugarat\nominibus. Sed regna Tyri germanus habebat\nPygmalion, scelere ante alios immanior omnes.\nQuos inter medius venit furor. Ille Sychaeum\nimpius ante aras, atque auri caecus amore,\nclam ferro incautum superat, securus amorum\ngermanae; factumque diu celavit, et aegram,\nmulta malus simulans, vana spe lusit amantem.\nIpsa sed in somnis inhumati venit imago\nconiugis, ora modis attollens pallida miris,\ncrudeles aras traiectaque pectora ferro\nnudavit, caecumque domus scelus omne retexit.\nTum celerare fugam patriaque excedere suadet,\nauxiliumque viae veteres tellure recludit\nthesauros, ignotum argenti pondus et auri.\nHis commota fugam Dido sociosque parabat:\nconveniunt, quibus aut odium crudele tyranni\naut metus acer erat; navis, quae forte paratae,\ncorripiunt, onerantque auro: portantur avari\nPygmalionis opes pelago; dux femina facti.\nDevenere locos, ubi nunc ingentia cernis\nmoenia surgentemque novae Karthaginis arcem,\nmercatique solum, facti de nomine Byrsam,\ntaurino quantum possent circumdare tergo.\nSed vos qui tandem, quibus aut venistis ab oris,\nquove tenetis iter? 'Quaerenti talibus ille\nsuspirans, imoque trahens a pectore vocem:\n'O dea, si prima repetens ab origine pergam,\net vacet annalis nostrorum audire laborum,\nante diem clauso componat Vesper Olympo.\nNos Troia antiqua, si vestras forte per auris\nTroiae nomen iit, diversa per aequora vectos\nforte sua Libycis tempestas adpulit oris.\nSum pius Aeneas, raptos qui ex hoste Penates\nclasse veho mecum, fama super aethera notus.\nItaliam quaero patriam et genus ab Iove summo.\nBis denis Phrygium conscendi navibus aequor,\nmatre dea monstrante viam, data fata secutus;\nvix septem convolsae undis Euroque supersunt.\nIpse ignotus, egens, Libyae deserta peragro,\nEuropa atque Asia pulsus.' Nec plura querentem\npassa Venus medio sic interfata dolore est:\n'Quisquis es, haud, credo, invisus caelestibus auras\nvitalis carpis, Tyriam qui adveneris urbem.\nPerge modo, atque hinc te reginae ad limina perfer,\nNamque tibi reduces socios classemque relatam\nnuntio, et in tutum versis aquilonibus actam,\nni frustra augurium vani docuere parentes.\nAspice bis senos laetantis agmine cycnos,\naetheria quos lapsa plaga Iovis ales aperto\nturbabat caelo; nunc terras ordine longo\naut capere, aut captas iam despectare videntur:\nut reduces illi ludunt stridentibus alis,\net coetu cinxere polum, cantusque dedere,\nhaud aliter puppesque tuae pubesque tuorum\naut portum tenet aut pleno subit ostia velo.\nPerge modo, et, qua te ducit via, dirige gressum.'\nDixit, et avertens rosea cervice refulsit,\nambrosiaeque comae divinum vertice odorem\nspiravere, pedes vestis defluxit ad imos,\net vera incessu patuit dea. Ille ubi matrem\nadgnovit, tali fugientem est voce secutus:\n'Quid natum totiens, crudelis tu quoque, falsis\nludis imaginibus? Cur dextrae iungere dextram\nnon datur, ac veras audire et reddere voces?'\nTalibus incusat, gressumque ad moenia tendit:\nat Venus obscuro gradientes aere saepsit,\net multo nebulae circum dea fudit amictu,\ncernere ne quis eos, neu quis contingere posset,\nmolirive moram, aut veniendi poscere causas.\nIpsa Paphum sublimis abit, sedesque revisit\nlaeta suas, ubi templum illi, centumque Sabaeo\nture calent arae, sertisque recentibus halant.\nCorripuere viam interea, qua semita monstrat.\nIamque ascendebant collem, qui plurimus urbi\nimminet, adversasque adspectat desuper arces.\nMiratur molem Aeneas, magalia quondam,\nmiratur portas strepitumque et strata viarum.\nInstant ardentes Tyrii pars ducere muros,\nmolirique arcem et manibus subvolvere saxa,\npars optare locum tecto et concludere sulco.\n[Iura magistratusque legunt sanctumque senatum;]\nhic portus alii effodiunt; hic alta theatris\nfundamenta locant alii, immanisque columnas\nrupibus excidunt, scaenis decora alta futuris.\nQualis apes aestate nova per florea rura\nexercet sub sole labor, cum gentis adultos\neducunt fetus, aut cum liquentia mella\nstipant et dulci distendunt nectare cellas,\naut onera accipiunt venientum, aut agmine facto\nignavom fucos pecus a praesepibus arcent:\nfervet opus, redolentque thymo fragrantia mella.\n'O fortunati, quorum iam moenia surgunt!'\nAeneas ait, et fastigia suspicit urbis.\nInfert se saeptus nebula, mirabile dictu,\nper medios, miscetque viris, neque cernitur ulli.\nLucus in urbe fuit media, laetissimus umbra,\nquo primum iactati undis et turbine Poeni\neffodere loco signum, quod regia Iuno\nmonstrarat, caput acris equi; sic nam fore bello\negregiam et facilem victu per saecula gentem.\nHic templum Iunoni ingens Sidonia Dido\ncondebat, donis opulentum et numine divae,\naerea cui gradibus surgebant limina, nexaeque\naere trabes, foribus cardo stridebat aenis.\nHoc primum in luco nova res oblata timorem\nleniit, hic primum Aeneas sperare salutem\nausus, et adflictis melius confidere rebus.\nNamque sub ingenti lustrat dum singula templo,\nreginam opperiens, dum, quae fortuna sit urbi,\nartificumque manus inter se operumque laborem\nmiratur, videt Iliacas ex ordine pugnas,\nbellaque iam fama totum volgata per orbem,\nAtridas, Priamumque, et saevum ambobus Achillem.\nConstitit, et lacrimans, 'Quis iam locus' inquit 'Achate,\nquae regio in terris nostri non plena laboris?\nEn Priamus! Sunt hic etiam sua praemia laudi;\nsunt lacrimae rerum et mentem mortalia tangunt.\nSolve metus; feret haec aliquam tibi fama salutem.'\nSic ait, atque animum pictura pascit inani,\nmulta gemens, largoque umectat flumine voltum.\nNamque videbat, uti bellantes Pergama circum\nhac fugerent Graii, premeret Troiana iuventus,\nhac Phryges, instaret curru cristatus Achilles.\nNec procul hinc Rhesi niveis tentoria velis\nadgnoscit lacrimans, primo quae prodita somno\nTydides multa vastabat caede cruentus,\nardentisque avertit equos in castra, prius quam\npabula gustassent Troiae Xanthumque bibissent.\nParte alia fugiens amissis Troilus armis,\ninfelix puer atque impar congressus Achilli,\nfertur equis, curruque haeret resupinus inani,\nlora tenens tamen; huic cervixque comaeque trahuntur\nper terram, et versa pulvis inscribitur hasta.\nInterea ad templum non aequae Palladis ibant\ncrinibus Iliades passis peplumque ferebant,\nsuppliciter tristes et tunsae pectora palmis;\ndiva solo fixos oculos aversa tenebat.\nTer circum Iliacos raptaverat Hectora muros,\nexanimumque auro corpus vendebat Achilles.\nTum vero ingentem gemitum dat pectore ab imo,\nut spolia, ut currus, utque ipsum corpus amici,\ntendentemque manus Priamum conspexit inermis.\nSe quoque principibus permixtum adgnovit Achivis,\nEoasque acies et nigri Memnonis arma.\nDucit Amazonidum lunatis agmina peltis\nPenthesilea furens, mediisque in milibus ardet,\naurea subnectens exsertae cingula mammae,\nbellatrix, audetque viris concurrere virgo.\nHaec dum Dardanio Aeneae miranda videntur,\ndum stupet, obtutuque haeret defixus in uno,\nregina ad templum, forma pulcherrima Dido,\nincessit magna iuvenum stipante caterva.\nQualis in Eurotae ripis aut per iuga Cynthi\nexercet Diana choros, quam mille secutae\nhinc atque hinc glomerantur oreades; illa pharetram\nfert umero, gradiensque deas supereminet omnis:\nLatonae tacitum pertemptant gaudia pectus:\ntalis erat Dido, talem se laeta ferebat\nper medios, instans operi regnisque futuris.\nTum foribus divae, media testudine templi,\nsaepta armis, solioque alte subnixa resedit.\nIura dabat legesque viris, operumque laborem\npartibus aequabat iustis, aut sorte trahebat:\ncum subito Aeneas concursu accedere magno\nAnthea Sergestumque videt fortemque Cloanthum,\nTeucrorumque alios, ater quos aequore turbo\ndispulerat penitusque alias avexerat oras.\nObstipuit simul ipse simul perculsus Achates\nlaetitiaque metuque; avidi coniungere dextras\nardebant; sed res animos incognita turbat.\nDissimulant, et nube cava speculantur amicti,\nquae fortuna viris, classem quo litore linquant,\nquid veniant; cunctis nam lecti navibus ibant,\norantes veniam, et templum clamore petebant.\nPostquam introgressi et coram data copia fandi,\nmaximus Ilioneus placido sic pectore coepit:\n'O Regina, novam cui condere Iuppiter urbem\niustitiaque dedit gentis frenare superbas,\nTroes te miseri, ventis maria omnia vecti,\noramus, prohibe infandos a navibus ignis,\nparce pio generi, et propius res aspice nostras.\nNon nos aut ferro Libycos populare Penatis\nvenimus, aut raptas ad litora vertere praedas;\nnon ea vis animo, nec tanta superbia victis.\nEst locus, Hesperiam Grai cognomine dicunt,\nterra antiqua, potens armis atque ubere glaebae;\nOenotri coluere viri; nunc fama minores\nItaliam dixisse ducis de nomine gentem.\nHic cursus fuit:\ncum subito adsurgens fluctu nimbosus Orion\nin vada caeca tulit, penitusque procacibus austris\nperque undas, superante salo, perque invia saxa\ndispulit; huc pauci vestris adnavimus oris.\nQuod genus hoc hominum? Quaeve hunc tam barbara morem\npermittit patria? Hospitio prohibemur harenae;\nbella cient, primaque vetant consistere terra.\nSi genus humanum et mortalia temnitis arma\nat sperate deos memores fandi atque nefandi.\n'Rex erat Aeneas nobis, quo iustior alter,\nnec pietate fuit, nec bello maior et armis.\nQuem si fata virum servant, si vescitur aura\naetheria, neque adhuc crudelibus occubat umbris,\nnon metus; officio nec te certasse priorem\npoeniteat. Sunt et Siculis regionibus urbes\narmaque, Troianoque a sanguine clarus Acestes.\nQuassatam ventis liceat subducere classem,\net silvis aptare trabes et stringere remos:\nsi datur Italiam, sociis et rege recepto,\ntendere, ut Italiam laeti Latiumque petamus;\nsin absumpta salus, et te, pater optime Teucrum,\npontus habet Libyae, nec spes iam restat Iuli,\nat freta Sicaniae saltem sedesque paratas,\nunde huc advecti, regemque petamus Acesten.'\nTalibus Ilioneus; cuncti simul ore fremebant Dardanidae.\nTum breviter Dido, voltum demissa, profatur:\n'Solvite corde metum, Teucri, secludite curas.\nRes dura et regni novitas me talia cogunt\nmoliri, et late finis custode tueri.\nQuis genus Aeneadum, quis Troiae nesciat urbem,\nvirtutesque virosque, aut tanti incendia belli?\nNon obtusa adeo gestamus pectora Poeni,\nnec tam aversus equos Tyria Sol iungit ab urbe.\nSeu vos Hesperiam magnam Saturniaque arva,\nsive Erycis finis regemque optatis Acesten,\nauxilio tutos dimittam, opibusque iuvabo.\nVoltis et his mecum pariter considere regnis;\nurbem quam statuo vestra est, subducite navis;\nTros Tyriusque mihi nullo discrimine agetur.\nAtque utinam rex ipse Noto compulsus eodem\nadforet Aeneas! Equidem per litora certos\ndimittam et Libyae lustrare extrema iubebo,\nsi quibus eiectus silvis aut urbibus errat.'\nHis animum arrecti dictis et fortis Achates\net pater Aeneas iamdudum erumpere nubem\nardebant. Prior Aenean compellat Achates:\n'Nate dea, quae nunc animo sententia surgit?\nomnia tuta vides, classem sociosque receptos.\nUnus abest, medio in fluctu quem vidimus ipsi\nsubmersum; dictis respondent cetera matris.'\nVix ea fatus erat, cum circumfusa repente\nscindit se nubes et in aethera purgat apertum.\nRestitit Aeneas claraque in luce refulsit,\nos umerosque deo similis; namque ipsa decoram\ncaesariem nato genetrix lumenque iuventae\npurpureum et laetos oculis adflarat honores:\nquale manus addunt ebori decus, aut ubi flavo\nargentum Pariusve lapis circumdatur auro.\nTum sic reginam adloquitur, cunctisque repente\nimprovisus ait: 'Coram, quem quaeritis, adsum,\nTroius Aeneas, Libycis ereptus ab undis.\nO sola infandos Troiae miserata labores,\nquae nos, reliquias Danaum, terraeque marisque\nomnibus exhaustos iam casibus, omnium egenos,\nurbe, domo, socias, grates persolvere dignas\nnon opis est nostrae, Dido, nec quicquid ubique est\ngentis Dardaniae, magnum quae sparsa per orbem.\nDi tibi, si qua pios respectant numina, si quid\nusquam iustitia est et mens sibi conscia recti,\npraemia digna ferant. Quae te tam laeta tulerunt\nsaecula? Qui tanti talem genuere parentes?\nIn freta dum fluvii current, dum montibus umbrae\nlustrabunt convexa, polus dum sidera pascet,\nsemper honos nomenque tuum laudesque manebunt,\nquae me cumque vocant terrae.' Sic fatus, amicum\nIlionea petit dextra, laevaque Serestum,\npost alios, fortemque Gyan fortemque Cloanthum.\nObstipuit primo aspectu Sidonia Dido,\ncasu deinde viri tanto, et sic ore locuta est:\n'Quis te, nate dea, per tanta pericula casus\ninsequitur? Quae vis immanibus applicat oris?\nTune ille Aeneas, quem Dardanio Anchisae\nalma Venus Phrygii genuit Simoentis ad undam?\nAtque equidem Teucrum memini Sidona venire\nfinibus expulsum patriis, nova regna petentem\nauxilio Beli; genitor tum Belus opimam\nvastabat Cyprum, et victor dicione tenebat.\nTempore iam ex illo casus mihi cognitus urbis\nTroianae nomenque tuum regesque Pelasgi.\nIpse hostis Teucros insigni laude ferebat,\nseque ortum antiqua Teucrorum ab stirpe volebat.\nQuare agite, O tectis, iuvenes, succedite nostris.\nMe quoque per multos similis fortuna labores\niactatam hac demum voluit consistere terra.\nNon ignara mali, miseris succurrere disco.'\nSic memorat; simul Aenean in regia ducit\ntecta, simul divom templis indicit honorem.\nNec minus interea sociis ad litora mittit\nviginti tauros, magnorum horrentia centum\nterga suum, pinguis centum cum matribus agnos,\nmunera laetitiamque dii.\nAt domus interior regali splendida luxu\ninstruitur, mediisque parant convivia tectis:\narte laboratae vestes ostroque superbo,\ningens argentum mensis, caelataque in auro\nfortia facta patrum, series longissima rerum\nper tot ducta viros antiqua ab origine gentis.\nAeneas (neque enim patrius consistere mentem\npassus amor) rapidum ad navis praemittit Achaten,\nAscanio ferat haec, ipsumque ad moenia ducat;\nomnis in Ascanio cari stat cura parentis.\nMunera praeterea, Iliacis erepta ruinis,\nferre iubet, pallam signis auroque rigentem,\net circumtextum croceo velamen acantho,\nornatus Argivae Helenae, quos illa Mycenis,\nPergama cum peteret inconcessosque hymenaeos,\nextulerat, matris Ledae mirabile donum:\npraeterea sceptrum, Ilione quod gesserat olim,\nmaxima natarum Priami, colloque monile\nbacatum, et duplicem gemmis auroque coronam.\nHaec celerans ita ad naves tendebat Achates.\nAt Cytherea novas artes, nova pectore versat\nConsilia, ut faciem mutatus et ora Cupido\npro dulci Ascanio veniat, donisque furentem\nincendat reginam, atque ossibus implicet ignem;\nquippe domum timet ambiguam Tyriosque bilinguis;\nurit atrox Iuno, et sub noctem cura recursat.\nErgo his aligerum dictis adfatur Amorem:\n'Nate, meae vires, mea magna potentia solus,\nnate, patris summi qui tela Typhoia temnis,\nad te confugio et supplex tua numina posco.\nFrater ut Aeneas pelago tuus omnia circum\nlitora iactetur odiis Iunonis iniquae,\nnota tibi, et nostro doluisti saepe dolore.\nHunc Phoenissa tenet Dido blandisque moratur\nvocibus; et vereor, quo se Iunonia vertant\nhospitia; haud tanto cessabit cardine rerum.\nQuocirca capere ante dolis et cingere flamma\nreginam meditor, ne quo se numine mutet,\nsed magno Aeneae mecum teneatur amore.\nQua facere id possis, nostram nunc accipe mentem.\nRegius accitu cari genitoris ad urbem\nSidoniam puer ire parat, mea maxima cura,\ndona ferens, pelago et flammis restantia Troiae:\nhunc ego sopitum somno super alta Cythera\naut super Idalium sacrata sede recondam,\nne qua scire dolos mediusve occurrere possit.\nTu faciem illius noctem non amplius unam\nfalle dolo, et notos pueri puer indue voltus,\nut, cum te gremio accipiet laetissima Dido\nregalis inter mensas laticemque Lyaeum,\ncum dabit amplexus atque oscula dulcia figet,\noccultum inspires ignem fallasque veneno.'\nParet Amor dictis carae genetricis, et alas\nexuit, et gressu gaudens incedit Iuli.\nAt Venus Ascanio placidam per membra quietem\ninrigat, et fotum gremio dea tollit in altos\nIdaliae lucos, ubi mollis amaracus illum\nfloribus et dulci adspirans complectitur umbra.\nIamque ibat dicto parens et dona Cupido\nregia portabat Tyriis, duce laetus Achate.\nCum venit, aulaeis iam se regina superbis\naurea composuit sponda mediamque locavit.\nIam pater Aeneas et iam Troiana iuventus\nconveniunt, stratoque super discumbitur ostro.\nDant famuli manibus lymphas, Cereremque canistris\nexpediunt, tonsisque ferunt mantelia villis.\nQuinquaginta intus famulae, quibus ordine longam\ncura penum struere, et flammis adolere Penatis;\ncentum aliae totidemque pares aetate ministri,\nqui dapibus mensas onerent et pocula ponant.\nNec non et Tyrii per limina laeta frequentes\nconvenere, toris iussi discumbere pictis.\nMirantur dona Aeneae, mirantur Iulum\nflagrantisque dei voltus simulataque verba,\n[pallamque et pictum croceo velamen acantho.]\nPraecipue infelix, pesti devota futurae,\nexpleri mentem nequit ardescitque tuendo\nPhoenissa, et pariter puero donisque movetur.\nIlle ubi complexu Aeneae colloque pependit\net magnum falsi implevit genitoris amorem,\nreginam petit haec oculis, haec pectore toto\nhaeret et interdum gremio fovet, inscia Dido,\ninsidat quantus miserae deus; at memor ille\nmatris Acidaliae paulatim abolere Sychaeum\nincipit, et vivo temptat praevertere amore\niam pridem resides animos desuetaque corda.\nPostquam prima quies epulis, mensaeque remotae,\ncrateras magnos statuunt et vina coronant.\nFit strepitus tectis, vocemque per ampla volutant\natria; dependent lychni laquearibus aureis\nincensi, et noctem flammis funalia vincunt.\nHic regina gravem gemmis auroque poposcit\nimplevitque mero pateram, quam Belus et omnes\na Belo soliti; tum facta silentia tectis:\n'Iuppiter, hospitibus nam te dare iura loquuntur,\nhunc laetum Tyriisque diem Troiaque profectis\nesse velis, nostrosque huius meminisse minores.\nAdsit laetitiae Bacchus dator, et bona Iuno;\net vos, O, coetum, Tyrii, celebrate faventes.'\nDixit, et in mensam laticum libavit honorem,\nprimaque, libato, summo tenus attigit ore,\ntum Bitiae dedit increpitans; ille impiger hausit\nspumantem pateram, et pleno se proluit auro\npost alii proceres. Cithara crinitus Iopas\npersonat aurata, docuit quem maximus Atlas.\nHic canit errantem lunam solisque labores;\nunde hominum genus et pecudes; unde imber et ignes;\nArcturum pluviasque Hyadas geminosque Triones;\nquid tantum Oceano properent se tinguere soles\nhiberni, vel quae tardis mora noctibus obstet.\nIngeminant plausu Tyrii, Troesque sequuntur.\nNec non et vario noctem sermone trahebat\ninfelix Dido, longumque bibebat amorem,\nmulta super Priamo rogitans, super Hectore multa;\nnunc quibus Aurorae venisset filius armis,\nnunc quales Diomedis equi, nunc quantus Achilles.\n'Immo age, et a prima dic, hospes, origine nobis\ninsidias,' inquit, 'Danaum, casusque tuorum,\nerroresque tuos; nam te iam septima portat\nomnibus errantem terris et fluctibus aestas.'",

        meter: 'laalaasslax'
      },
      ovid: {
        text: 'In nova fert animus mutatas dicere formas\ncorpora; di, coeptis, nam vos mutastis et illa,\nadspirate meis primaque ab origine mundi\nad mea perpetuum deducite tempora carmen.',

    let poeta = null;
    let lastPcm = null;
    let lastSampleRate = null;
    let lastWavBlob = null;
    let updateTimer = null;
    let demoTimer = null;

    // --- Macronization ---

    function macronize(text, meter) {
      if (!scansionsDict) return text;
      try {
        var lines = text.split('\n');
        return lines.map(function(line) {
          if (!line.trim()) return '';
          var s = preScansion(line);
          s = scansion(s, meter);
          // strip syllable markers
          s = s.replace(/\//g, '');
          // restore digraphs
          s = s.replace(/q/g, 'qu');
          s = s.replace(/dz/g, 'z');
          s = s.replace(/cs/g, 'x');
          // diphthongs: ae, oe etc with 8 -> circumflex on first letter
          s = s.replace(/%([aeiou])([aeiou])8/g, function(_, a, b) {
            return (CIRCUMFLEX[a] || a) + b;
          });
          // diphthongs with short/positional/anceps -> plain letters
          s = s.replace(/%([aeiou])([aeiou])[046]/g, '$1$2');
          // long vowels (8) -> circumflex
          s = s.replace(/%([aeiou])8/g, function(_, v) {
            return CIRCUMFLEX[v] || v;
          });
          // short/positional/anceps (0, 4, 6) -> plain letter
          s = s.replace(/%([aeiou])[046]/g, '$1');
          // clean trailing whitespace from scansion()
          s = s.replace(/\s+$/, '');
          return s;
        }).join('\n');
      } catch (e) {
        return text.toLowerCase();
      }
    }

    // --- Waveform drawing ---

    function drawWaveform(canvas, pcm) {
      var ctx = canvas.getContext('2d');
      var w = canvas.width;
      var h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      if (!pcm || pcm.length === 0) return;
      var step = pcm.length / w;
      ctx.fillStyle = '#6699cc';
      var mid = h / 2;
      for (var x = 0; x < w; x++) {
        var idx = Math.floor(x * step);
        // find min/max in this bucket
        var end = Math.min(Math.floor((x + 1) * step), pcm.length);
        var lo = 0, hi = 0;
        for (var j = idx; j < end; j++) {
          if (pcm[j] < lo) lo = pcm[j];
          if (pcm[j] > hi) hi = pcm[j];
        }
        var yTop = mid - (hi / 32768) * mid;
        var yBot = mid - (lo / 32768) * mid;
        var barH = Math.max(yBot - yTop, 1);
        ctx.fillRect(x, yTop, 1, barH);
      }
    }

    function resizeCanvas() {
      var canvas = document.getElementById('waveform');
      canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
      canvas.height = 64 * (window.devicePixelRatio || 1);
      canvas.getContext('2d').scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
      if (lastPcm) drawWaveform(canvas, lastPcm);
    }

    // --- Live update ---

    function scheduleUpdate() {
      if (updateTimer) clearTimeout(updateTimer);
      updateTimer = setTimeout(doUpdate, 120);
    }

    function doUpdate() {
      var text = document.getElementById('text').value;
      var meter = document.getElementById('meter').value;
      var timingEl = document.getElementById('timing');
      if (!text.trim() || !meter.trim()) {
        document.getElementById('scansion-display').textContent = '';
        timingEl.textContent = '';
        lastPcm = null;
        drawWaveform(document.getElementById('waveform'), null);
        return;
      }

      // macronized scansion
      var t0 = performance.now();
      document.getElementById('scansion-display').textContent = macronize(text, meter);
      var t1 = performance.now();
      var phoMs = (t1 - t0).toFixed(1);
      var mbrolaMs = '';

      // synthesize audio if mbrola is ready
      if (poeta && poeta.initialized) {
        try {
          var pho = poeta.textToPho(text, meter);
          var t2 = performance.now();
          var pcm = poeta.mbrola.synthesize(pho);
          var t3 = performance.now();
          mbrolaMs = (t3 - t2).toFixed(1);
          lastPcm = pcm;
          lastSampleRate = poeta.mbrola.getSampleRate();
          lastWavBlob = createWavBlob(pcm, lastSampleRate);
          drawWaveform(document.getElementById('waveform'), pcm);
        } catch (e) {
          console.warn('Synthesis error:', e.message);
        }
      }

      timingEl.textContent = mbrolaMs ? phoMs + 'ms pho + ' + mbrolaMs + 'ms mbrola' : phoMs + 'ms pho';

      // update pho display if visible
      var phoContainer = document.getElementById('pho-container');
      if (phoContainer.style.display !== 'none') {
        try {
          document.getElementById('pho-output').textContent = poeta ? poeta.textToPho(text, meter) : synthesize(text, meter);
        } catch (e) {}
      }
    }

    // --- Meter ---

    function onPresetChange() {
      stopDemo();
      var sel = document.getElementById('meter-preset');
      document.getElementById('meter').value = sel.value;
      doUpdate();
    }

    function onMeterInput() {
      stopDemo();
      var val = document.getElementById('meter').value;
      var sel = document.getElementById('meter-preset');
      var matched = false;
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === val) {
          sel.selectedIndex = i;
          matched = true;
          break;
        }
      }
      if (!matched) sel.selectedIndex = -1;
      doUpdate();
    }

    // --- Playback ---

    function playAudio() {
      if (!lastPcm || !lastSampleRate) return;
      var audioEl = document.getElementById('audio-player');
      var url = URL.createObjectURL(lastWavBlob);
      audioEl.src = url;
      audioEl.style.display = 'block';
      audioEl.play();
    }

    function downloadWav() {
      if (!lastWavBlob) return;
      var url = URL.createObjectURL(lastWavBlob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'latin-speech.wav';
      a.click();
      URL.revokeObjectURL(url);
    }

    function togglePho() {
      var c = document.getElementById('pho-container');
      if (c.style.display === 'none') {
        c.style.display = 'block';
        doUpdate();
      } else {
        c.style.display = 'none';
      }
    }

    // --- Examples ---

    function loadExample(name) {
      stopDemo();
      var ex = EXAMPLES[name];
      if (!ex) return;
      document.getElementById('text').value = ex.text;
      document.getElementById('meter').value = ex.meter;
      var sel = document.getElementById('meter-preset');
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === ex.meter) { sel.selectedIndex = i; break; }
      }
      doUpdate();
    }

    // --- Hash URL support ---

    function loadFromHash() {
      var hash = window.location.hash.slice(1);
      if (!hash) return;
      var params = new URLSearchParams(hash);
      var text = params.get('text');
      var meter = params.get('meter');
      if (text) document.getElementById('text').value = text;
      if (meter) document.getElementById('meter').value = meter;
    }

    // --- Init ---

    async function initialize() {
      var errEl = document.getElementById('error-status');
      try {
        if (typeof createMbrolaModule === 'undefined') {
          throw new Error('MBROLA WASM not loaded. Run mbrola-wasm/build.sh first.');
        }
        poeta = new PoetaBrowser();
        await poeta.init({ voiceUrl: 'i', scansionsUrl: 'scansions.json' });
        document.getElementById('play-btn').disabled = false;
        document.getElementById('download-btn').disabled = false;
        startDemo();
      } catch (error) {
        console.error('Init failed:', error);
        errEl.textContent = 'Initialization failed: ' + error.message;
        errEl.style.display = 'block';
      }
    }

    // --- Demo: reveal lines one at a time ---

    function startDemo() {
      var lines = EXAMPLES.aeneid.text.split('\n');
      var meter = EXAMPLES.aeneid.meter;
      document.getElementById('meter').value = meter;
      var sel = document.getElementById('meter-preset');
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === meter) { sel.selectedIndex = i; break; }
      }
      var textEl = document.getElementById('text');
      textEl.value = '';
      var lineIdx = 0;
      function addLine() {
        if (lineIdx >= lines.length) { demoTimer = null; return; }
        textEl.value = (textEl.value ? textEl.value + '\n' : '') + lines[lineIdx];
        lineIdx++;
        doUpdate();
        demoTimer = setTimeout(addLine, 1000);
      }
      addLine();
    }

    function stopDemo() {
      if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
    }

    // --- Bind events ---

    document.getElementById('text').addEventListener('input', function() { stopDemo(); scheduleUpdate(); });
    window.addEventListener('resize', resizeCanvas);

    window.addEventListener('load', function() {
      loadFromHash();
      resizeCanvas();
      initialize();
    });
  </script>
